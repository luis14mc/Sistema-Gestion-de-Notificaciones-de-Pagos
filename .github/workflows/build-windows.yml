# Build ejecutable Windows y adjuntar al Release
# Sistema de Pagos CNI - Consejo Nacional de Inversiones

name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag del release (ej: v2.2.0)'
        required: true
        default: 'v2.2.0'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller --clean app_rrhh_cni.spec

      - name: Create ZIP
        id: zip
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -eq "") { $tag = "${{ github.event.inputs.tag }}" }
          $zip = "SistemaPagosCNI_${tag}_Windows.zip"
          Compress-Archive -Path dist\SistemaPagosCNI -DestinationPath $zip
          echo "zip=$zip" >> $env:GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: Sistema de Pagos CNI ${{ github.ref_name || github.event.inputs.tag }}
          files: ${{ steps.zip.outputs.zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
